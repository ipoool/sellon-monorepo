name: Release & Deploy

# Production deploy is triggered ONLY by pushing a semantic-version tag
# (v1.2.3, also accepts prerelease like v1.2.3-rc.1), and ONLY if that tag
# points at a commit that lives on `main` (guard job below). This makes
# production releases deliberate + traceable to a version, instead of
# auto-deploying every push.
#
#   git tag v1.4.0 && git push origin v1.4.0
#
# workflow_dispatch is kept as a manual escape hatch (e.g. re-deploy current
# images) — it skips the on-main guard since the operator picks the ref.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

# GITHUB_TOKEN needs write to packages to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  # ── Gate: the tagged commit must be on main, else refuse to deploy ──────
  guard:
    name: Guard — tag must be on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can test ancestry vs main
      - name: Ensure tagged commit is on main
        if: github.event_name == 'push'
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "✓ ${GITHUB_REF_NAME} ($GITHUB_SHA) is on main — proceeding."
          else
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main. Production deploy refused."
            exit 1
          fi

  build-api:
    name: Build & push API image
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          target: prod
          push: true
          # Tag with the version (ref_name), the commit SHA (immutable, for
          # rollback), and latest.
          tags: |
            ghcr.io/${{ github.repository_owner }}/sellon-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sellon-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sellon-api:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/sellon-api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/sellon-api:buildcache,mode=max

  build-web:
    name: Build & push Web image
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Next.js bakes NEXT_PUBLIC_* into the bundle at build time. Store the
      # full web/.env.production contents as repo secret WEB_ENV_PRODUCTION.
      - name: Write web/.env.production
        run: printf '%s' "$WEB_ENV" > web/.env.production
        env:
          WEB_ENV: ${{ secrets.WEB_ENV_PRODUCTION }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sellon-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sellon-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sellon-web:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/sellon-web:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/sellon-web:buildcache,mode=max

  deploy:
    name: Deploy to production
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    environment: production # GitHub Environment — optional manual-approval gate
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG
          # Pin the deploy to the released version so rollback = re-run an
          # older tag. deploy.sh on the server pulls IMAGE_TAG and recreates.
          script: cd /var/www/app && IMAGE_TAG="$IMAGE_TAG" ./deploy.sh
        env:
          IMAGE_TAG: ${{ github.ref_name }}
